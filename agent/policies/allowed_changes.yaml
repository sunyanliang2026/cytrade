default_risk: low
allowed_paths:
  observability:
    - agent/
    - docs/
    - tests/
    - strategies/main_seal_follow/scripts/run_monitor_session.py
    - strategies/main_seal_follow/scripts/run_market_only.py
    - strategies/main_seal_follow/strategy.py
  replay:
    - agent/
    - tests/
    - docs/
  documentation:
    - AGENTS.md
    - agent/memory/
    - docs/
forbidden_paths:
  - .env
  - .env.*
  - config/local_runtime.json
  - data/db/
  - saved_states/
requires_human_approval:
  - config/settings.py
  - trading/
  - strategies/main_seal_follow/strategy.py
  - run_main_seal_follow.py
